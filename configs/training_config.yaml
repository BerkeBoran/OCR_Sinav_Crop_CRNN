# CRNN Modeli Eğitim Konfigürasyonu

# Veri ayarları
data_dir: data
# 10-12 haneli numaraların rakamları okunabilsin diye geniş tutuldu
img_width: 256
img_height: 32

# Model ayarları
cnn_channels: [32, 64, 128]
rnn_hidden: 256

# Eğitim ayarları
num_epochs: 300
batch_size: 32
learning_rate: 0.0003  # ön-eğitilmiş modelden ince ayar için düşük tutuldu
weight_decay: 0.0001

# Optimizer ayarları
optimizer: adam
scheduler: ReduceLROnPlateau
scheduler_patience: 15
scheduler_factor: 0.5

# DataLoader ayarları
# Not: Küçük veri setinde 0 en hızlısı (macOS'ta worker başlatma maliyeti yüksek)
num_workers: 0
pin_memory: true

# Veri split'leri
test_size: 0.2
val_size: 0.1

# Diğer ayarlar
seed: 42
verbose: true
save_best_only: true
