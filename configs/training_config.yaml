# CRNN Modeli Eğitim Konfigürasyonu

# Veri ayarları
data_dir: data
img_width: 128
img_height: 32

# Model ayarları
cnn_channels: [32, 64, 128]
rnn_hidden: 256

# Eğitim ayarları
num_epochs: 50
batch_size: 32
learning_rate: 0.001
weight_decay: 0.0001

# Optimizer ayarları
optimizer: adam
scheduler: ReduceLROnPlateau
scheduler_patience: 5
scheduler_factor: 0.5

# DataLoader ayarları
num_workers: 4
pin_memory: true

# Veri split'leri
test_size: 0.2
val_size: 0.1

# Diğer ayarlar
seed: 42
verbose: true
save_best_only: true
